<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Patient Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card glass-panel">
            <h2>AI Medical Receptionist</h2>
            <p>Please enter your Patient ID to access your session and memories.</p>
            <div class="chat-input login-input-group">
                <input type="text" id="login-id" placeholder="e.g. john@example.com" autocomplete="off" onkeypress="if(event.key === 'Enter') handleLogin()">
                <button onclick="handleLogin()">Enter</button>
            </div>
        </div>
    </div>

    <div class="app-layout" id="app-layout" style="display: none;">
        <!-- Observability Panel -->
        <div class="side-panel glass-panel">
            <div class="panel-header">Observability Logs</div>
            <pre id="log-output" class="panel-content">Loading logs...</pre>
        </div>

        <!-- Chat Panel -->
        <div class="chat-container glass-panel">
            <div class="chat-header" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="online-indicator"></div>
                    AI Medical Receptionist
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message bot">Hello! How can I assist you with an appointment today?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- Database Panel -->
        <div class="side-panel glass-panel">
            <div class="panel-header">Database State</div>
            <pre id="db-output" class="panel-content">Loading database state...</pre>
        </div>
    </div>
    <script src="/static/chat.js?v=3"></script>
</body>
</html>
